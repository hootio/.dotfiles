# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -g default-shell "$SHELL"
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10
set -g status-position top
set -g mouse on
set -g allow-passthrough on
set -g set-clipboard on
set -as terminal-features ',xterm-ghostty:clipboard:bracketed-paste'
set -as terminal-features ',tmux-256color:clipboard:bracketed-paste'
set -g status-keys vi
set -g mode-keys vi
set -g monitor-activity on
set -g visual-activity off


# -- catppuccin mocha palette --------------------------------------------------

%hidden CRUST="#11111b"
%hidden MANTLE="#181825"
%hidden BASE="#1e1e2e"
%hidden SURFACE0="#313244"
%hidden SURFACE1="#45475a"
%hidden SURFACE2="#585b70"
%hidden OVERLAY0="#6c7086"
%hidden OVERLAY1="#7f849c"
%hidden TEXT="#cdd6f4"
%hidden LAVENDER="#b4befe"
%hidden BLUE="#89b4fa"
%hidden SAPPHIRE="#74c7ec"
%hidden TEAL="#94e2d5"
%hidden GREEN="#a6e3a1"
%hidden YELLOW="#f9e2af"
%hidden PEACH="#fab387"
%hidden RED="#f38ba8"


# -- status bar ----------------------------------------------------------------

set -g status-style "fg=$TEXT,bg=$SURFACE0"
set -g status-left "#[fg=$CRUST,bg=$YELLOW,bold] #S #[default] "
set -g status-left-length 20
set -g status-right-length 100
set -g status-right "#[fg=$YELLOW,bold]#{?client_prefix,⌨ ,}#[default]#{?session_many_attached,⚇ ,}#[fg=$RED,bold]#{?pane_synchronized,⚏ ,}#[default]#(pmset -g batt 2>/dev/null | grep -Eo '[0-9]+%%' | head -1 | sed '/./s/$/ | /')↑ #(uptime | sed 's/.*up *//' | sed 's/, *[0-9]* user.*//' | sed 's/ *days*/d/;s/ *day/d/;s/,//;s/ *\\([0-9]*\\):\\([0-9]*\\)/ \\1h \\2m/') | %a %b %d | %I:%M:%S %p | #(whoami) #[fg=$CRUST,bg=$TEAL,bold] #(hostname -f | cut -d. -f1,2) "


# -- window status -------------------------------------------------------------

setw -g window-status-format " #{?window_bell_flag,#{?window_last_flag,#[fg=$BLUE],#[fg=$CRUST]}#[bg=$RED#,bold],#{?window_last_flag,#[fg=$BLUE],#[fg=$OVERLAY1]}#{?window_activity_flag,#[bg=$PEACH],}}#I #W#{?window_zoomed_flag, Z,} "
setw -g window-status-current-format "#[fg=$CRUST,bg=$LAVENDER,bold] #I #W#{?window_zoomed_flag, Z,} "
setw -g window-status-last-style "fg=$BLUE"
setw -g window-status-activity-style "fg=$OVERLAY1,bg=$PEACH"
setw -g window-status-bell-style "fg=$CRUST,bg=$RED,bold"
set -g window-status-separator ""


# -- pane/window styling -------------------------------------------------------

set -g pane-border-style "fg=$SURFACE0"
set -g pane-active-border-style "#{?pane_in_mode,fg=$PEACH,#{?synchronize-panes,fg=$RED,fg=$BLUE}}"
set -g message-style "fg=$CRUST,bg=$YELLOW,bold"
set -g message-command-style "fg=$CRUST,bg=$PEACH,bold"
set -g mode-style "fg=$CRUST,bg=$GREEN,bold"
set -g clock-mode-colour "$SAPPHIRE"
set -g clock-mode-style 12
set -g display-panes-active-colour "$BLUE"
set -g display-panes-colour "$BLUE"


# -- key bindings --------------------------------------------------------------

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# edit config
bind e new-window -n "tmux.conf" "$EDITOR ~/.config/tmux/tmux.conf && tmux source ~/.config/tmux/tmux.conf \; display 'Config reloaded'"

# session
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# splits (retain current path)
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"

# pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# window navigation
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# buffers
bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# toggle mouse
bind m set -g mouse \; display "Mouse #{?mouse,on,off}"

# Ctrl+L: clear screen preserving scrollback and current input
bind -n C-l send-keys C-a " " C-a C-k "clear" Enter C-y C-a C-d C-e


# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# mouse copy — OSC 52 handles clipboard on both local macOS and remote Linux over SSH
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel


# -- plugins (tpm) -------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# auto-install tpm if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# initialize tpm (must be last)
run '~/.config/tmux/plugins/tpm/tpm'
