palette = "catppuccin_mocha"

format = """
$directory\
$fill\
$cmd_duration\
$time\
$line_break\
$status\
$character\
"""

[username]
show_always = true
format = '[$user]($style)'
style_user = 'italic strikethrough green'

[hostname]
ssh_only = false
format = '[@$hostname:]($style)'
style = 'italic dimmed green'

[directory]
format = '[$path]($style)[$read_only]($read_only_style)'
truncation_length = 0
truncate_to_repo = false
style = 'teal'

[fill]
symbol = '.'
style = 'dimmed overlay1'

[time]
disabled = false
format = '[$time]($style) '
time_format = '[%T][%b %d]'
style = 'dimmed overlay1'

[status]
disabled = false
format = '[\[$status\]]($style)'
success_symbol = ' '
style = 'pink'

[cmd_duration]
format = '[$duration]($style)'
min_time = 0
show_milliseconds = true
style = 'yellow'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
